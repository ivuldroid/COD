<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngopichat Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #ece5dd; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; font-weight: bold; text-align: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .other-msg { align-self: flex-start; background: #ffffff; }
        .controls { background: #f0f0f0; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        input, select, button { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        .input-chat { display: flex; gap: 5px; }
    </style>
</head>
<body>

    <header>Ngopichat Pro</header>

    <div class="controls">
        <input type="text" id="my-name" placeholder="Nama Anda">
        <div style="display: flex; gap: 5px;">
            <select id="mode-select" onchange="toggleMode()">
                <option value="group">Mode Grup</option>
                <option value="private">Mode Private</option>
            </select>
            <input type="text" id="target-name" placeholder="Nama Grup / Nama Teman" style="flex:1">
            <button onclick="startChat()">Pindah</button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-chat" style="padding: 10px;">
        <input type="text" id="message-input" style="flex: 1;" placeholder="Tulis pesan...">
        <button onclick="sendMessage()" style="background: #075e54; color: white;">Kirim</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // --- PASTE CONFIG ANDA DI SINI ---
        const firebaseConfig = {
            apiKey: "AIzaSyBYmToj9vCG2RdnLrmMO40GZfzZ0xHjMWc",
            authDomain: "chatingan-29a2d.firebaseapp.com",
            projectId: "chatingan-29a2d",
            storageBucket: "chatingan-29a2d.appspot.com",
            messagingSenderId: "906088341701",
            appId: "1:906088341701:web:3695356e5614ddf00d90ac"
        };
        // ---------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentRoomId = "umum";
        let unsubscribe = null;

        window.toggleMode = () => {
            const mode = document.getElementById("mode-select").value;
            document.getElementById("target-name").placeholder = (mode === "group") ? "Nama Grup" : "Nama Teman";
        };

        window.startChat = () => {
            const mode = document.getElementById("mode-select").value;
            const target = document.getElementById("target-name").value || "umum";
            const myName = document.getElementById("my-name").value;

            if (mode === "private") {
                // Urutkan nama agar Ani_Budi sama dengan Budi_Ani
                const names = [myName, target].sort();
                currentRoomId = names.join("_");
            } else {
                currentRoomId = target;
            }
            loadMessages();
        };

        function loadMessages() {
            if (unsubscribe) unsubscribe();
            const q = query(collection(db, "messages"), where("roomId", "==", currentRoomId), orderBy("createdAt", "asc"));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById("chat-box");
                chatBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMyMsg = data.sender === document.getElementById("my-name").value;
                    chatBox.innerHTML += `<div class="message ${isMyMsg ? 'my-msg' : 'other-msg'}"><b>${data.sender}:</b> ${data.text}</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById("message-input");
            const myName = document.getElementById("my-name").value;
            if (!myName || input.value.trim() === "") return;

            await addDoc(collection(db, "messages"), {
                text: input.value,
                sender: myName,
                roomId: currentRoomId,
                createdAt: serverTimestamp()
            });
            input.value = "";
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngopichat</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #ece5dd; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .other-msg { align-self: flex-start; background: #ffffff; }
        .sender-name { font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; display: block; }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 5px; flex-direction: column; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header>Ngopichat</header>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="username" placeholder="Nama Anda...">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="message-input" style="flex: 1;" placeholder="Tulis pesan...">
            <button onclick="sendMessage()">Kirim</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBYmToj9vCG2RdnLrmMO40GZfzZ0xHjMWc",
            authDomain: "chatingan-29a2d.firebaseapp.com",
            projectId: "chatingan-29a2d",
            storageBucket: "chatingan-29a2d.firebasestorage.app",
            messagingSenderId: "906088341701",
            appId: "1:906088341701:web:3695356e5614ddf00d90ac",
            measurementId: "G-04BK65KB94"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fungsi untuk membuat warna unik berdasarkan nama
        function getColorForName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const colors = ['#e6194b', '#3cb44b', '#f58231', '#4363d8', '#911eb4', '#46f0f0', '#f032e6'];
            return colors[Math.abs(hash) % colors.length];
        }

        // 1. Memuat nama dari memori saat aplikasi dibuka
        window.onload = () => {
            const savedName = localStorage.getItem("username");
            if (savedName) document.getElementById("username").value = savedName;
        };

        // 2. Fungsi Mengirim Pesan
        window.sendMessage = async () => {
            const input = document.getElementById("message-input");
            const name = document.getElementById("username").value || "Anonim";
            localStorage.setItem("username", name);
            if (input.value.trim() === "") return;

            await addDoc(collection(db, "messages"), {
                text: input.value,
                sender: name,
                createdAt: serverTimestamp()
            });
            input.value = "";
        };

        // 3. Fungsi Mendengarkan Pesan secara Real-time
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        
        onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById("chat-box");
            const currentUsername = document.getElementById("username").value;
            chatBox.innerHTML = ""; 
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMyMessage = data.sender === currentUsername;
                const userColor = getColorForName(data.sender || "Anonim");
                
                chatBox.innerHTML += `
                    <div class="message ${isMyMessage ? 'my-msg' : 'other-msg'}">
                        <span class="sender-name" style="color: ${userColor};">${data.sender || "Anonim"}</span>
                        ${data.text}
                    </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
